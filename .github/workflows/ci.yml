name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Correr tests con cobertura
        env:
          JWT_SECRET: test-secret-key-32-characters-min
          USERS_SERVICE_URL: http://localhost:8000
          CATALOG_SERVICE_URL: http://localhost:8001
          ORDERS_SERVICE_URL: http://localhost:8002
          METRICS_SERVICE_URL: http://localhost:8003
          PAYMENTS_SERVICE_URL: http://localhost:8004
        run: |
          pytest tests/ -v --tb=short \
            --cov=src \
            --cov-report=term-missing \
            --cov-fail-under=70

      - name: Verificar formato
        run: |
          pip install ruff
          ruff check src/